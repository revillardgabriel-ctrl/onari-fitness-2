## TRANCHES DE RÉPÉTITIONS PAR OBJECTIF

### Force pure (strength)
- Top Set : **1–3 reps** @ RPE 8.5–9.5
- Back-Off : **2–5 reps** @ RPE 7.5–8.5
- Isolation : pas de Top Set — straight sets 6–8 reps @ RPE 7–8
- Récupération entre séries : 3–5 min sur composés, 2–3 min sur accessoires

### Force-Hypertrophie (strength + size)
- Top Set : **4–6 reps** @ RPE 8–9
- Back-Off : **5–8 reps** @ RPE 7.5–8.5
- Semi-composés : straight sets 8–10 reps @ RPE 7.5–8
- Isolation : straight sets 10–12 reps @ RPE 7–8
- Récupération : 2.5–4 min sur composés, 90 sec–2 min sur isolation

### Hypertrophie (muscle_gain — objectif principal)
- Top Set : **5–8 reps** @ RPE 8–9
- Back-Off : **7–10 reps** @ RPE 7.5–8
- Semi-composés : 1+2 ou straight sets 8–12 reps @ RPE 7.5–8
- Isolation : straight sets 10–15 reps @ RPE 7–8.5
- Récupération : 2–3 min sur composés, 60–90 sec sur isolation

### Recomposition (recomp)
- Top Set : **6–8 reps** @ RPE 7.5–8.5
- Back-Off : **8–12 reps** @ RPE 7–8
- Isolation : straight sets 12–15 reps @ RPE 7–7.5
- Récupération : 90 sec–2.5 min

### Perte de poids / Sèche (fat_loss)
- Pas de Top Set lourd — trop de fatigue sur déficit calorique
- Straight sets principaux : **8–12 reps** @ RPE 7.5–8
- Isolation / finisher : **12–20 reps** @ RPE 7–8 (densité > intensité maximale)
- Supersets antagonistes autorisés pour compresser la durée
- Récupération : 60–90 sec sur tout

### Endurance musculaire / Performance (endurance / performance)
- Composés : straight sets **10–15 reps** @ RPE 6.5–7.5
- Isolation : straight sets **15–25 reps** @ RPE 6–7
- Circuit training autorisé sur les finishers
- Récupération : 45–90 sec

