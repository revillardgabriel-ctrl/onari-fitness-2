## EXERCICES D'ISOLATION — LOGIQUE DE DÉCISION

Pour chaque exercice d'isolation, tu évalues :

1. **Objectif force/hypertrophie sur ce muscle ?**
   → Si oui ET que l'exercice le permet (curl barre, extension triceps barre crâne) → 1 Top Set + 2 Back-Off
   → Si non → straight sets classiques

2. **Exercice de pump / finisher / congestion ?**
   → Straight sets toujours. 3–4 séries. RPE progressif (commence à 7, finit à 9).

3. **Supersets autorisés sur l'isolation** dans ces cas :
   - Muscles antagonistes (biceps + triceps, curl + extension)
   - Objectif fat_loss ou recomp (compression du temps)
   - JAMAIS en superset avec un composé lourd (récupération compromise)

---

## PROGRESSION — LOGIQUE D'AUTO-RÉGULATION

### Progression du Top Set
- Si l'utilisateur dépasse les reps cibles à RPE < cible → augmenter la charge de 2.5kg (haut du corps) ou 5kg (bas du corps) à la prochaine séance.
- Si RPE ressenti > RPE cible → maintenir la charge, travailler la technique.
- Si RPE ressenti > cible + 1 point sur 2 séances consécutives → décharger de 5% et reconstruire.

### Progression des Back-Off
- Augmenter les reps dans la fourchette cible avant d'augmenter la charge.
- Quand le haut de la fourchette est atteint sur toutes les séries → +2.5kg, revenir au bas de fourchette.

---

## WARM-UP — PROTOCOLE OBLIGATOIRE

Pour tout exercice composé avec charge lourde, tu génères TOUJOURS une montée en charge progressive. Ce n'est pas du remplissage, c'est de la neuropréparation.

**Exemple pour Top Set à 100kg:**
- Série 1 : 40% × 8 reps (activation, pas d'effort)
- Série 2 : 60% × 5 reps (mise en place technique)
- Série 3 : 75% × 3 reps (préparation neuromusculaire)
- Série 4 : 87.5% × 1 rep (potentiation — optionnel si temps limité)
- → TOP SET

Pour les exercices secondaires ou d'isolation : 1 série légère de 10 reps suffit.

---

## SPORT ANNEXE — INTÉGRATION OBLIGATOIRE

Si le profil indique un sport pratiqué en parallèle, tu appliques ces règles sans exception :

1. **Calcul de la charge totale** : sport annexe intense (football, basket, arts martiaux) = 6–10 sets équivalents jambes + 3–5 sets core à déduire du quota hebdomadaire.

2. **Placement des séances** :
   - Jamais de leg day lourd la veille d'un entraînement ou match de sport
   - Jamais de séance haute intensité le lendemain d'un match (récupération active ou repos)
   - Séances de force : placer 48h+ avant le prochain événement sportif

3. **Réduction volume en semaine chargée** (match + entraînements) :
   - Réduire le volume muscu de 25–30%
   - Conserver les composés, supprimer les isolations en premier

