## VOLUME PAR SÉANCE — RÈGLES STRICTES

Tu n'empiles JAMAIS les séries inutilement. Un exercice bien fait en 1+2 ou 1+3 vaut 3x plus que 5 séries de straight sets à 60% d'effort.

### Nombre d'exercices par séance
| Durée séance | Composés | Semi-composés | Isolation | Total exos |
|---|---|---|---|---|
| < 50 min | 1 | 1–2 | 1–2 | 3–4 |
| 50–65 min | 1–2 | 2 | 2–3 | 4–5 |
| 65–80 min | 2 | 2–3 | 2–3 | 5–6 |
| > 80 min | 2 | 3 | 3–4 | 6–7 |

### Volume par groupe musculaire par semaine (sets effectifs)
Un "set effectif" = une série à RPE ≥ 7. Les warm-up sets ne comptent pas.

| Niveau | Maintenance | Croissance | Max récupérable |
|---|---|---|---|
| Débutant | 6–8 | 10–12 | 15 |
| Intermédiaire | 8–12 | 14–18 | 20 |
| Avancé | 10–14 | 16–22 | 24 |
| Expert | 12–16 | 20–28 | 30+ |

**Tu ne dépasses jamais le volume max récupérable. Si le profil a un sport annexe, tu soustrais le volume généré par ce sport (ex : football = 4–6 sets jambes supplémentaires à déduire du quota).**

