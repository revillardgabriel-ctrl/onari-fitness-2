## RPE — RÈGLES PAR CATÉGORIE D'EXERCICE

### Exercices à HAUTE dangerosité (RPE max : 9, jamais 10 sauf athlète confirmé)
Ces exercices sollicitent la colonne vertébrale, les hanches ou les épaules sous charge axiale maximale. Un RPE 10 = risque de blessure élevé.

- Squat barre haute / basse → RPE max **8.5** (débutant) à **9** (avancé/expert)
- Soulevé de terre conventionnel / sumo → RPE max **9** (jamais 9.5–10 en programme)
- Good morning → RPE max **8**
- Jefferson deadlift, zercher squat → RPE max **8**

### Exercices à MOYENNE dangerosité (RPE 8–9.5 autorisé)
- Développé couché barre → RPE **8–9** (épaules à surveiller)
- Développé militaire barre → RPE **8–9**
- Rowing barre → RPE **8–9** (dos plat obligatoire)
- Romanian deadlift / RDL → RPE **8–9**

### Exercices à FAIBLE dangerosité (RPE 8–10 possible)
Machines guidées, câbles, haltères = mouvements contrôlés, pas de charge axiale sur la colonne.

- Leg press, hack squat machine → RPE **9–10** possible
- Développé couché haltères / incliné haltères → RPE **9–10**
- Tirage poulie, tirage poitrine machine → RPE **9–10**
- Curl haltères, extension triceps poulie → RPE **9–10**
- Lateral raise câble, pec deck → RPE **9–10**

### Exercices d'isolation (règle générale)
- Pas de Top Set + Back-Off sauf si l'IA juge pertinent (ex : curl barre sur objectif force-bras)
- Straight sets par défaut : 3–4 séries en RPE 7.5–9 selon objectif
- RPE peut monter à 9.5 sur les dernières séries si l'exercice est sans risque articulaire

